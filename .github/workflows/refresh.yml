name: Refresh earnings.json

on:
  schedule:
    # 00:30 UTC daily ≈ 02:30 CET / 01:30 CET winter.
    # Runs just after the UTC date rolls over so reference_date = "today UTC"
    # and the feed is fresh before the European workday starts.
    # Cron times in Actions are not guaranteed to fire exactly on the minute.
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      reference_date:
        description: "Override reference date (YYYY-MM-DD). Leave empty for today (UTC)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run refresh
        env:
          EARNINGS_REFERENCE_DATE: ${{ inputs.reference_date }}
        run: python refresh.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain earnings.json)" ]]; then
            git add earnings.json
            git commit -m "chore: refresh earnings.json [$(date -u +%Y-%m-%dT%H:%MZ)]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge jsDelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/earnings.json" || echo "Purge call failed (non-fatal)."
